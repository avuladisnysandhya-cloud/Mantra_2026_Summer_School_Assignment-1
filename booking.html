<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Your Stay | MANTRA Luxury Resort & Spa</title>
  <meta name="description" content="Secure your luxury accommodation booking layout online using our secure validation portal.">
  <meta name="keywords" content="resort reservation form, luxury stay booking, hotel application check">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html">MANTRA <span>RESORT</span></a>
      <button class="menu-btn" id="menuBtn">☰</button>
      <nav class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="about.html">About Hotel</a>
        <a href="facilities.html">Resort Facilities</a>
        <a href="rooms.html">Rooms & Pricing</a>
        <a href="gallery.html">Photo Exhibits</a>
        <a href="booking.html" class="active">Stay Booking</a>
        <a href="contact.html">Contact Hub</a>
      </nav>
    </div>
  </header>

  <main>
    <section style="background: linear-gradient(135deg, #0b1528, #1e293b); color: white; padding: 60px 0; text-align: center;">
      <div class="container">
        <h1 style="font-family: 'Marcellus', serif; font-size: 38px;">Reservation Desk</h1>
        <p style="color: #c5a880;">Secure Your Absolute Luxury Experience</p>
      </div>
    </section>

    <section style="background: linear-gradient(rgba(248, 250, 252, 0.85), rgba(241, 245, 249, 0.9)), url('https://images.unsplash.com/photo-1571896349842-33c89424de2d?q=80&w=1200') no-repeat center center/cover; padding: 80px 0;">
      <div class="container" style="max-width: 650px; margin: 0 auto; padding: 0 20px;">
        <div style="background: white; padding: 45px; border-radius: 4px; box-shadow: 0 15px 35px rgba(11, 21, 40, 0.06); border-top: 4px solid #c5a880;">
          <h2 style="font-family: 'Marcellus', serif; text-align: center; color: #0b1528; margin-bottom: 35px; font-size: 28px; letter-spacing: 1px;">Stay Registration Form</h2>
          
          <form id="bookingForm">
            <div style="margin-bottom: 25px;">
              <label style="display: block; font-weight: bold; margin-bottom: 10px; color: #0b1528; font-size: 13px; letter-spacing: 0.5px;">GUEST FULL NAME</label>
              <input type="text" id="name" placeholder="Enter your full name" required style="width: 100%; padding: 12px 15px; border-radius: 4px; border: 1px solid #cbd5e1; font-size: 15px; background-color: #f8fafc; box-sizing: border-box;">
            </div>

            <div style="margin-bottom: 25px;">
              <label style="display: block; font-weight: bold; margin-bottom: 10px; color: #0b1528; font-size: 13px; letter-spacing: 0.5px;">EMAIL ADDRESS</label>
              <input type="email" id="email" placeholder="name@example.com" required style="width: 100%; padding: 12px 15px; border-radius: 4px; border: 1px solid #cbd5e1; font-size: 15px; background-color: #f8fafc; box-sizing: border-box;">
            </div>

            <div style="margin-bottom: 25px;">
              <label style="display: block; font-weight: bold; margin-bottom: 10px; color: #0b1528; font-size: 13px; letter-spacing: 0.5px;">CONTACT MOBILE NUMBER</label>
              <input type="tel" id="phone" placeholder="Enter 10-digit mobile number" required style="width: 100%; padding: 12px 15px; border-radius: 4px; border: 1px solid #cbd5e1; font-size: 15px; background-color: #f8fafc; box-sizing: border-box;">
            </div>

            <div style="margin-bottom: 35px;">
              <label style="display: block; font-weight: bold; margin-bottom: 10px; color: #0b1528; font-size: 13px; letter-spacing: 0.5px;">PREFERRED ACCOMMODATION SELECTION</label>
              <select id="destination" required style="width: 100%; padding: 12px 15px; border-radius: 4px; border: 1px solid #cbd5e1; font-size: 15px; background: #f8fafc; box-sizing: border-box;">
                <option value="">-- Click to choose suite category --</option>
                <option value="deluxe">Deluxe Ocean View Suite</option>
                <option value="wellness">Executive Wellness Suite</option>
                <option value="presidential">Presidential Private Villa</option>
              </select>
            </div>

            <button type="submit" style="width: 100%; padding: 14px; font-size: 15px; background-color: #c5a880; color: #0b1528; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; letter-spacing: 1px; transition: all 0.3s ease; box-shadow: 0 4px 12px rgba(197, 168, 128, 0.25);">Transmit Booking Verification</button>
            
            <p id="formMessage" style="margin-top: 20px; text-align: center; font-weight: bold;"></p>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer style="background-color: #0b1528; color: #94a3b8; padding: 35px 0; text-align: center; border-top: 1px solid rgba(197, 168, 128, 0.2);">
    <p style="font-size: 14px;">© 2026 MANTRA Luxury Resort & Spa. High-Fidelity Custom Independent Assignment Web Template.</p>
  </footer>

</body>
</html>
