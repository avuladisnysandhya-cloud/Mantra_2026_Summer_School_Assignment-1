<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stay Booking & Reservation Desk | MANTRA Resort</title>
  <meta name="description" content="Book your premium suites online at MANTRA Luxury Resort. Seamless stay reservation registration.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html">MANTRA <span>RESORT</span></a>
      <button class="menu-btn" id="menuBtn">☰</button>
      <nav class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="about.html">About Hotel</a>
        <a href="facilities.html">Resort Facilities</a>
        <a href="rooms.html">Rooms & Pricing</a>
        <a href="gallery.html">Photo Exhibits</a>
        <a href="booking.html" class="active">Stay Booking</a>
        <a href="contact.html">Contact Hub</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="rooms-hero">
      <div class="container">
        <h1 class="rooms-hero-title">Reservation Desk</h1>
        <p class="rooms-hero-subtitle">Secure Your Absolute Luxury Experience</p>
      </div>
    </section>

    <section class="container" style="padding: 60px 0;">
      <div class="calculator-box">
        <h2 class="calc-heading">Stay Registration Form</h2>
        <form action="#" method="POST" onsubmit="alert('Booking Request Transmitted Successfully!'); return false;">
          <label class="calc-label">GUEST FULL NAME</label>
          <input type="text" placeholder="Enter your full name" class="calc-input" required>

          <label class="calc-label">EMAIL ADDRESS</label>
          <input type="email" placeholder="name@example.com" class="calc-input" required>

          <label class="calc-label">CONTACT MOBILE NUMBER</label>
          <input type="tel" placeholder="Enter 10 digit mobile number" class="calc-input" required>

          <label class="calc-label">PREFERRED ACCOMMODATION SELECTION</label>
          <select class="calc-select" required>
            <option value="">-- Click to choose suite category --</option>
            <option value="deluxe">Deluxe Ocean View</option>
            <option value="executive">Executive Wellness Suite</option>
            <option value="presidential">Presidential Villa</option>
          </select>

          <button type="submit" class="btn calc-btn">Transmit Booking Verification</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="main-footer">
    <div class="container">
      <p>© 2026 MANTRA Luxury Resort & Spa. High-Fidelity Custom Independent Assignment Web Template.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
